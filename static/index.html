<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonicKraft — Your Music, Anywhere</title>
    <meta name="description" content="SonicKraft by S.K. — Download Spotify playlists in MP3, FLAC, or M4A and translate song links across all platforms.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Animated aurora background -->
    <div class="aurora-wrap">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Music note particles -->
    <div class="notes-wrap" id="notes-wrap"></div>

    <!-- Drag & Drop overlay -->
    <div class="drag-overlay hidden" id="drag-overlay">
        <div class="drag-inner">
            <div class="drag-icon">♪</div>
            <p>Drop your link here</p>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden">
        <span id="toast-msg">✓ Copied to clipboard!</span>
    </div>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo-wrap">
                <div class="logo-icon">
                    <span>SK</span>
                </div>
                <div>
                    <h1>Sonic<span class="accent">Kraft</span></h1>
                    <p class="tagline">Your music. Your format. Anywhere.</p>
                </div>
            </div>
        </header>

        <!-- Tab switcher -->
        <div class="tab-bar">
            <button class="tab active" id="tab-download" onclick="switchTab('download')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download
            </button>
            <button class="tab" id="tab-convert" onclick="switchTab('convert')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                Translate Link
            </button>
        </div>

        <main>
            <!-- ===== DOWNLOAD TAB ===== -->
            <div id="panel-download" class="panel active">
                <div class="input-group">
                    <div class="input-icon-wrap">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
                        <input type="text" id="spotify-url" placeholder="Paste Spotify playlist or song URL..." autocomplete="off">
                    </div>
                </div>
                
                <div class="options-row">
                    <select id="audio-format" class="format-select">
                        <option value="mp3">🎵 MP3 · 320kbps</option>
                        <option value="flac">✨ FLAC · Lossless</option>
                        <option value="m4a">🎧 M4A · High Quality</option>
                    </select>

                    <div class="input-icon-wrap path-wrap">
                        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                        <input type="text" id="download-path" placeholder="Download folder (optional, e.g. D:\Music)">
                    </div>
                </div>

                <button id="download-btn" class="primary-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span class="btn-text">Start Download</span>
                    <div class="loader hidden" id="btn-loader"></div>
                </button>

                <!-- Status Panel -->
                <div id="status-panel" class="status-panel hidden">
                    <div class="equalizer" id="equalizer">
                        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
                        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
                        <span class="bar"></span><span class="bar"></span>
                    </div>
                    <div class="status-text-wrap">
                        <p class="status-label">PROCESSING</p>
                        <p id="status-text" class="status-live">Preparing your playlist...</p>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill-animated"></div>
                    </div>
                </div>

                <!-- Error -->
                <div id="error-message" class="error-box hidden"></div>

                <!-- Success -->
                <div id="success-link" class="success-box hidden">
                    <div class="success-icon">✓</div>
                    <div>
                        <p class="success-title">Download Complete!</p>
                        <p id="success-path" class="success-path">Saved to folder.</p>
                    </div>
                </div>
            </div>

            <!-- ===== TRANSLATE TAB ===== -->
            <div id="panel-convert" class="panel">
                <div class="input-group">
                    <div class="input-icon-wrap">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                        <input type="text" id="convert-url" placeholder="Paste any Spotify, YouTube, or Apple Music link..." autocomplete="off">
                    </div>
                </div>

                <button id="convert-btn" class="primary-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                    <span class="btn-text-convert">Translate Link</span>
                    <div class="loader hidden" id="convert-loader"></div>
                </button>

                <div id="convert-error" class="error-box hidden"></div>

                <div id="convert-results" class="convert-results hidden">
                    <p class="results-label">Found on these platforms</p>
                    <div id="platform-links" class="platform-grid"></div>
                </div>
            </div>
        </main>

        <!-- Download History Panel -->
        <div class="history-panel" id="history-panel">
            <div class="history-header">
                <span class="history-title">Recent Downloads</span>
                <button class="clear-history-btn" id="clear-history-btn">Clear</button>
            </div>
            <div id="history-list" class="history-list"></div>
            <p class="history-empty hidden" id="history-empty">No downloads yet.</p>
        </div>

        <footer>
            <div class="stats-bar">
                <span>⬇ <strong id="stat-total">0</strong> songs downloaded</span>
                <span>·</span>
                <span>Built by <strong>S.K.</strong> · Srikar Kuchi</span>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
